name: CI
on:
  push:
  schedule:
    - cron: '0 0 * * *'
jobs:
  build:
    name: Test & Build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js
        uses: actions/setup-node@v1
        with:
          node-version: "20.x"
      - name: Install dependencies
        run: npm install
      - name: Test Package
        run: npm run test
      - name: Build Package
        run: npm run build
  integration:
    name: E2E Tests
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js
        uses: actions/setup-node@v1
        with:
          node-version: "20.x"
      - name: Install dependencies
        run: npm install
      - name: E2E Tests
        run: npm run test:e2e
  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: always() && !cancelled() && (needs.build.result != 'skipped' || needs.integration.result != 'skipped')
    env:
      CI_RESULT: ${{ needs.build.result != 'skipped' && needs.build.result || needs.integration.result }}
      CI_JOB_NAME: ${{ needs.build.result != 'skipped' && 'Test & Build' || 'E2E Tests' }}
      CI_STATUS_LABEL: ${{ (needs.build.result != 'skipped' && needs.build.result || needs.integration.result) == 'success' && 'passed' || 'failed' }}
      CI_STATUS_EMOJI: ${{ (needs.build.result != 'skipped' && needs.build.result || needs.integration.result) == 'success' && '✅' || '❌' }}
      CI_JOB_EMOJI: ${{ needs.build.result != 'skipped' && '🧪' || '🌐' }}
      CI_EVENT_EMOJI: ${{ github.event_name == 'push' && '🚀' || '⏰' }}
      CI_RESULT_EMOJI: ${{ (needs.build.result != 'skipped' && needs.build.result || needs.integration.result) == 'success' && '🟢' || (needs.build.result != 'skipped' && needs.build.result || needs.integration.result) == 'failure' && '🔴' || '🟡' }}
    steps:
      - name: Post to Slack
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ env.CI_STATUS_EMOJI }} CI ${{ env.CI_STATUS_LABEL }} — ${{ env.CI_JOB_EMOJI }} ${{ env.CI_JOB_NAME }} (${{ env.CI_EVENT_EMOJI }} ${{ github.event_name }}) on ${{ github.repository }}@${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ env.CI_STATUS_EMOJI }} CI ${{ env.CI_STATUS_LABEL }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ env.CI_JOB_EMOJI }} *${{ env.CI_JOB_NAME }}* finished with ${{ env.CI_RESULT_EMOJI }} *${{ env.CI_RESULT }}*"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "${{ env.CI_EVENT_EMOJI }} *Event*\n`${{ github.event_name }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "📦 *Repository*\n`${{ github.repository }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "🌿 *Ref*\n`${{ github.ref_name }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "👤 *Actor*\n@${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🔗 *Commit*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "📋 View workflow run",
                        "emoji": true
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "🔍 View commit",
                        "emoji": true
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "${{ env.CI_STATUS_EMOJI }} stock-nse-india CI · run #${{ github.run_number }}"
                    }
                  ]
                }
              ]
            }
