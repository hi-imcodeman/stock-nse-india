name: Publish Package (NPM)
on:
  release:
    types: [created]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v1
        with:
          node-version: "18.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && !cancelled()
    env:
      WORKFLOW_RESULT: ${{ needs.build.result }}
      STATUS_EMOJI: ${{ needs.build.result == 'success' && '✅' || '❌' }}
      RESULT_EMOJI: ${{ needs.build.result == 'success' && '🟢' || needs.build.result == 'failure' && '🔴' || '🟡' }}
    steps:
      - name: Post to Slack
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ env.STATUS_EMOJI }} ${{ github.workflow }} finished with ${{ env.WORKFLOW_RESULT }} on ${{ github.repository }}@${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ env.STATUS_EMOJI }} ${{ github.workflow }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "📦 *NPM publish* finished with ${{ env.RESULT_EMOJI }} *${{ env.WORKFLOW_RESULT }}*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "📦 *Repository*\n`${{ github.repository }}`" },
                    { "type": "mrkdwn", "text": "🌿 *Ref*\n`${{ github.ref_name }}`" },
                    { "type": "mrkdwn", "text": "🎯 *Event*\n`${{ github.event_name }}`" },
                    { "type": "mrkdwn", "text": "👤 *Actor*\n@${{ github.actor }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "📋 View workflow run", "emoji": true },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
