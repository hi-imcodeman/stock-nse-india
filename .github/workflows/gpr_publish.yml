name: Publish Package (GitHub)
on:
  release:
    types: [created]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v1
        with:
          node-version: "18.x"
          registry-url: "https://npm.pkg.github.com/hi-imcodeman"
          # Defaults to the user or organization that owns the workflow file
          scope: "@hi-imcodeman"
      - run: npm install
      - run: npm run gpr-setup
      - run: npm run build
      # Publish to GitHub Packages
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.IMCODEMAN_PACKAGE_TOKEN }}

  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && !cancelled()
    env:
      WORKFLOW_RESULT: ${{ needs.build.result }}
      STATUS_EMOJI: ${{ needs.build.result == 'success' && '✅' || '❌' }}
      RESULT_EMOJI: ${{ needs.build.result == 'success' && '🟢' || needs.build.result == 'failure' && '🔴' || '🟡' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Slack payload
        env:
          STATUS_EMOJI: ${{ env.STATUS_EMOJI }}
          RESULT_EMOJI: ${{ env.RESULT_EMOJI }}
          WORKFLOW_RESULT: ${{ env.WORKFLOW_RESULT }}
          WORKFLOW_NAME: ${{ github.workflow }}
          SUMMARY_LINE: 🧩 *GitHub package publish* finished with ${{ env.RESULT_EMOJI }} *${{ env.WORKFLOW_RESULT }}*
        run: python3 .github/scripts/build_workflow_slack_payload.py

      - name: Post to Slack
        uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload-file: slack-payload.json
