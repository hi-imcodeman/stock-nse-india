name: Publish Docker Image

on:
  push:
    branches:
      - master
      - 'docker-actions*'
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: imcodeman/nseindia
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref_name, 'docker-actions')) }}
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern=v{{version}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [docker]
    if: always() && !cancelled()
    env:
      WORKFLOW_RESULT: ${{ needs.docker.result }}
      STATUS_EMOJI: ${{ needs.docker.result == 'success' && '✅' || '❌' }}
      RESULT_EMOJI: ${{ needs.docker.result == 'success' && '🟢' || needs.docker.result == 'failure' && '🔴' || '🟡' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Slack payload
        env:
          STATUS_EMOJI: ${{ env.STATUS_EMOJI }}
          RESULT_EMOJI: ${{ env.RESULT_EMOJI }}
          WORKFLOW_RESULT: ${{ env.WORKFLOW_RESULT }}
          WORKFLOW_NAME: ${{ github.workflow }}
          SUMMARY_LINE: 🐳 *Docker publish* finished with ${{ env.RESULT_EMOJI }} *${{ env.WORKFLOW_RESULT }}*
        run: python3 .github/scripts/build_workflow_slack_payload.py

      - name: Post to Slack
        uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload-file: slack-payload.json
