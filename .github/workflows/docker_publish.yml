name: Publish Docker Image

on:
  push:
    branches:
      - master
      - 'docker-actions*'
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: imcodeman/nseindia
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref_name, 'docker-actions')) }}
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=semver,pattern=v{{version}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [docker]
    if: always() && !cancelled()
    env:
      WORKFLOW_RESULT: ${{ needs.docker.result }}
      STATUS_EMOJI: ${{ needs.docker.result == 'success' && '✅' || '❌' }}
      RESULT_EMOJI: ${{ needs.docker.result == 'success' && '🟢' || needs.docker.result == 'failure' && '🔴' || '🟡' }}
    steps:
      - name: Post to Slack
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ env.STATUS_EMOJI }} ${{ github.workflow }} finished with ${{ env.WORKFLOW_RESULT }} on ${{ github.repository }}@${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ env.STATUS_EMOJI }} ${{ github.workflow }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🐳 *Docker publish* finished with ${{ env.RESULT_EMOJI }} *${{ env.WORKFLOW_RESULT }}*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "📦 *Repository*\n`${{ github.repository }}`" },
                    { "type": "mrkdwn", "text": "🌿 *Ref*\n`${{ github.ref_name }}`" },
                    { "type": "mrkdwn", "text": "🎯 *Event*\n`${{ github.event_name }}`" },
                    { "type": "mrkdwn", "text": "👤 *Actor*\n@${{ github.actor }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "📋 View workflow run", "emoji": true },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
